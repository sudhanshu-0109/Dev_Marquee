<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Card</title>
</head>
<body>
    <div id="box">
        <div id="card">
            <div id="circle"></div>
            <img src="https://plus.unsplash.com/premium_photo-1668319914124-57301e0a1850?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>Ellyse Perry</h2>

            <div id="dets">
                <div id="posts" class="center">
                    <h4>250</h4>
                    <h5>Posts</h5>
                </div>
                <div id="follower" class="center">
                    <h4>940K</h4>
                    <h5>Followers</h5>
                </div>
                <div id="following" class="center">
                    <h4>185</h4>
                    <h5>Following</h5>
                </div>
            </div>

            <div id="buttons">
            <div id= "button1" class="button">
                <h3>Follow</h3>
            </div>
            <div id= "button2" class="button">
                <h3>Message</h3>
            </div>
            </div>
            
        </div>
    </div>
</body>
</html>
