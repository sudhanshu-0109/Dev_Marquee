<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Grid in CSS</title>
</head>

<body>
    <div id="grid">
        <div class="item item1">
            <img src="images/customization.png" alt="Customization">
        </div>
        <div class="item item2">
            <img src="images/birthday.png" alt="birthday">
        </div>
        <div class="item item3">
            <img src="images/wallet.png" alt="wallet">
        </div>
        <div class="item item4">
            <img src="images/inbox.png" alt="inbox">
        </div>
        <div class="item item5"><img src="images/gifts.png" alt="gifts">
        </div>
        <div class="item item6">
            <img src="images/Reminders.png" alt="Reminders">
        </div>
    </div>
</body>

</html>
