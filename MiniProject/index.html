<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Product Cards</title>
</head>
<body>

    <div id="container">
        <div id="card">

            <div id="logo">
                <div id="img">
                    <img src="https://www.svgrepo.com/show/525369/heart.svg" alt="">
                </div>
            </div>

            <img src="https://pronk.in/cdn/shop/products/37_d664c1cd-2d22-4c82-90a1-54e4a0e7017b.jpg?v=1669016527" alt="">

            <div id="details">
                <span class="tag">🔥 Trending</span>

                <h1>Black Hoodie</h1>

                <div class="price-row">
                    <p>₹1200</p>
                    <span class="rating">⭐ 4.8</span>
                </div>

                <button>Buy Now</button>
            </div>

        </div>
    </div>
