<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Amazon Clone</title>
</head>
<body>

    <!-- NAV 1 -->
    <div id="nav1">
        <div id="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQXt88C7rPiQTCFDr0kksQ9cwAHrqTtpHISQA&s" alt="Amazon">
        </div>

        <div id="search">
            <input type="text" placeholder="Search Amazon.in">
            <button>
                <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png" alt="search">
            </button>
        </div>

        <div id="me">
            <p>Hello, Sign in</p>
            <p><strong>Account & Lists</strong></p>
        </div>

        <div id="orders">
            <p>Returns</p>
            <p><strong>& Orders</strong></p>
        </div>

        <div id="cart">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzp2bGpcsIf4AXxGgzHzXyHbMsDzSL6q6PbQ&s" alt="cart">
        </div>
    </div>

    <!-- NAV 2 -->
    <div id="nav2">
        <a href="#">All</a>
        <a href="#">Fresh</a>
        <a href="#">MX Player</a>
        <a href="#">Sell</a>
        <a href="#">Best Sellers</a>
        <a href="#">Today's Deals</a>
        <a href="#">Mobiles</a>
        <a href="#">New Releases</a>
        <a href="#">Customer Service</a>
        <a href="#">Prime</a>
        <a href="#">Amazon Pay</a>
    </div>

    <!-- HERO BANNER -->
<!-- HERO BANNER -->
<div id="hero-wrapper">

    <button class="hero-arrow left-arrow" id="leftBtn">&#10094;</button>

    <div id="hero-track">
        <img class="slide" src="https://images-eu.ssl-images-amazon.com/images/G/31/INSLGW/74._CB783716748_.jpg" alt="Summer Fashion">
        <img class="slide" src="https://images-eu.ssl-images-amazon.com/images/G/31/2025/GW/UNREC/PC/78269._CB785061629_.jpg" alt="Mobiles">
        <img class="slide" src="https://images-eu.ssl-images-amazon.com/images/G/31/img21/Books/May26/Desktop_tall_Hero_3000x1200_EL_Rec._CB762895918_.jpg" alt="Luggage">
        <img class="slide" src="https://images-eu.ssl-images-amazon.com/images/G/31/img22/CEPC/Dec/amazonspecial/BFCM25_GW_PC_Hero._CB775393558_.jpg" alt="Kids Fashion">
        <img class="slide" src="https://images-eu.ssl-images-amazon.com/images/G/31/2025/GW/UNREC/PC/78268._CB785061629_.jpg" alt="men tshirts">
    </div>

    <button class="hero-arrow right-arrow" id="rightBtn">&#10095;</button>

</div>

    
 <script src="script.js"></script>
</body>
</html>
